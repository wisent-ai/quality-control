name: Wisent PR quality

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  informative-commits:
    name: Informative commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Check commit messages
        uses: wisent-ai/quality-control/.github/actions/informative-commits@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
